    <style>

        .footer .api-link:hover {

        .rank-display .next-rank {

<body>
    <div class="container">
        <h1>Swimming Points</h1>
        
        <form id="calcForm">
            <div class="row">
                <div class="form-group">
                    <label for="pool">Бассейн</label>
                    <select id="pool" required>
                        <option value="SCM">25 метров</option>
                        <option value="LCM">50 метров</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="gender">Пол</label>
                    <select id="gender" required>
                        <option value="male">Мужчины</option>
                        <option value="female">Женщины</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="event">Дистанция</label>
                <select id="event" required>
                    <option value="">Загрузка...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="time">Время</label>
                <input type="text" id="time" placeholder="1:05.42 или 28.50" required>
            </div>

            <button type="submit">Рассчитать</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Расчёт...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="result" id="result">
            <h2>Результат</h2>
            
            <div class="points-display">
                <div class="points-value" id="pointsValue">0</div>
                <div class="points-label">WA Points</div>
            </div>

            <div class="rank-display" id="rankDisplay">
                <div class="rank-value" id="rankValue">-</div>
                <div class="rank-label">Спортивный разряд</div>
                <div class="time-to-norm" id="timeToNorm"></div>
                <div class="next-rank" id="nextRank"></div>
            </div>
        </div>

        <div class="footer">
            <div class="copyright" id="copyright"></div>
            <a href="/docs" class="api-link" target="_blank">API документация</a>
        </div>
    </div>

    <script>
        const API_BASE = '';
        const poolSelect = document.getElementById('pool');
        const eventSelect = document.getElementById('event');
        const form = document.getElementById('calcForm');
        const resultDiv = document.getElementById('result');
        const errorDiv = document.getElementById('error');
        const loadingDiv = document.getElementById('loading');
    
        // Словарь перевода дистанций на русский язык
        const eventTranslations = {
            '50m freestyle': '50 м вольный стиль',
            '100m freestyle': '100 м вольный стиль',
            '200m freestyle': '200 м вольный стиль',
            '400m freestyle': '400 м вольный стиль',
            '800m freestyle': '800 м вольный стиль',
            '1500m freestyle': '1500 м вольный стиль',
            '50m backstroke': '50 м на спине',
            '100m backstroke': '100 м на спине',
            '200m backstroke': '200 м на спине',
            '50m breaststroke': '50 м брасс',
            '100m breaststroke': '100 м брасс',
            '200m breaststroke': '200 м брасс',
            '50m butterfly': '50 м баттерфляй',
            '100m butterfly': '100 м баттерфляй',
            '200m butterfly': '200 м баттерфляй',
            '100m medley': '100 м комплексное плавание',
            '200m medley': '200 м комплексное плавание',
            '400m medley': '400 м комплексное плавание'
        };
    
        // Функция перевода названия дистанции
        function translateEvent(eventName) {
            const key = eventName.toLowerCase().trim();
            return eventTranslations[key] || eventName;
        }
    
        // Функция проверки на эстафету (для фильтрации)
        function isRelay(eventName) {
            const name = eventName.toLowerCase();
            return name.includes('relay') || name.includes('4x') || name.includes('эстафета');
        }
    
        // Загрузка списка дистанций при изменении бассейна
        async function loadEvents() {
            const pool = poolSelect.value;
            eventSelect.innerHTML = '<option value="">Загрузка...</option>';
            
            try {
                const response = await fetch(`${API_BASE}/events?pool=${pool}`);
                const data = await response.json();
                
                eventSelect.innerHTML = '<option value="">Выберите дистанцию</option>';
                data.events.forEach(event => {
                    // Пропускаем эстафеты
                    if (isRelay(event)) return;
                    
                    const option = document.createElement('option');
                    option.value = event;
                    option.textContent = translateEvent(event);
                    eventSelect.appendChild(option);
                });
            } catch (error) {
                eventSelect.innerHTML = '<option value="">Ошибка загрузки</option>';
                console.error('Error loading events:', error);
            }
        }
    
        // Обработчик изменения бассейна
        poolSelect.addEventListener('change', loadEvents);
        
        // Первоначальная загрузка дистанций
        loadEvents();
    
        // Установка копирайта с текущим годом
        document.getElementById('copyright').textContent = `© ${new Date().getFullYear()} Владимир Юсупов`;
    
        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const pool = poolSelect.value;
            const gender = document.getElementById('gender').value;
            const event = eventSelect.value;
            const time = document.getElementById('time').value;
    
            // Проверка выбора дистанции
            if (!event) {
                showError('Выберите дистанцию');
                return;
            }
    
            // Показываем индикатор загрузки
            loadingDiv.classList.add('show');
            resultDiv.classList.remove('show');
            errorDiv.classList.remove('show');
    
            try {
                const params = new URLSearchParams({ time, event, pool, gender });
                const response = await fetch(`${API_BASE}/calculate?${params}`);
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.detail || 'Ошибка расчёта');
                }
    
                const data = await response.json();
                displayResult(data);
            } catch (error) {
                showError(error.message);
            } finally {
                loadingDiv.classList.remove('show');
            }
        });
    
        // Отображение результатов расчёта
        function displayResult(data) {
            // Отображение очков
            document.getElementById('pointsValue').textContent = data.points.toLocaleString();
    
            // Элементы блока разряда
            const rankDisplay = document.getElementById('rankDisplay');
            const rankValue = document.getElementById('rankValue');
            const timeToNorm = document.getElementById('timeToNorm');
            const nextRankEl = document.getElementById('nextRank');
            
            // Установка текущего разряда
            rankValue.textContent = data.rank || '—';
            
            // Стилизация блока разряда
            if (data.rank && data.rank !== 'Без разряда' && data.rank !== 'Нет норматива') {
                rankDisplay.classList.remove('no-rank');
                
                if (data.time_to_norm !== null && data.time_to_norm !== undefined) {
                    if (data.time_to_norm > 0) {
                        timeToNorm.textContent = `+${data.time_to_norm} сек`;
                        timeToNorm.className = 'time-to-norm positive';
                    } else if (data.time_to_norm < 0) {
                        timeToNorm.textContent = `${data.time_to_norm} сек`;
                        timeToNorm.className = 'time-to-norm negative';
                    } else {
                        timeToNorm.textContent = 'Точно в норматив';
                        timeToNorm.className = 'time-to-norm positive';
                    }
                } else {
                    timeToNorm.textContent = '';
                }
            } else {
                rankDisplay.classList.add('no-rank');
                timeToNorm.textContent = 'Норматив не выполнен';
                timeToNorm.className = 'time-to-norm negative';
            }
    
            // === Обработка следующего разряда ===
            if (data.next_rank && data.seconds_to_next !== null && data.seconds_to_next !== undefined) {
                if (data.seconds_to_next > 0) {
                    // Нужно улучшить время
                    nextRankEl.textContent = `⬆️ До ${data.next_rank}: ${data.seconds_to_next} сек`;
                    nextRankEl.className = 'next-rank';
                } else if (data.seconds_to_next < 0) {
                    // Уже достигнут следующий (редкий случай)
                    nextRankEl.textContent = `✅ ${data.next_rank} уже выполнен!`;
                    nextRankEl.className = 'next-rank';
                } else {
                    nextRankEl.textContent = `✅ Точно в норматив ${data.next_rank}!`;
                    nextRankEl.className = 'next-rank';
                }
            } else if (data.rank === 'Без разряда' && data.next_rank) {
                // Показываем, сколько до первого разряда
                if (data.seconds_to_next > 0) {
                    nextRankEl.textContent = `⬆️ До ${data.next_rank}: ${data.seconds_to_next} сек`;
                    nextRankEl.className = 'next-rank';
                }
            } else {
                // Высший разряд достигнут — нет следующего
                nextRankEl.textContent = '🏆 Высший разряд достигнут!';
                nextRankEl.className = 'next-rank unavailable';
            }
    
            // Показываем блок результатов
            resultDiv.classList.add('show');
        }
    
        // Функция показа ошибки
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }
    </script>
</body>
